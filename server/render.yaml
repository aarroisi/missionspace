databases:
  - name: missionspace-db
    plan: free
    databaseName: missionspace
    user: missionspace

services:
  - type: web
    name: missionspace-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: missionspace-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: PHX_HOST
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: AUTOMATION_SECRET_KEY
        sync: false
      - key: GITHUB_APP_INSTALL_URL
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY_PEM
        sync: false
      - key: SPRITE_API_BASE_URL
        sync: false
      - key: SPRITE_API_TOKEN
        sync: false
      - key: SPRITE_ORG_SLUG
        sync: false
      - key: SPRITE_EXECUTE_PATH
        sync: false
      - key: SPRITE_TIMEOUT_MS
        sync: false
      - key: AUTOMATION_WORKER_ENABLED
        sync: false
      - key: AUTOMATION_MAX_CONCURRENCY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_HOST
        sync: false
